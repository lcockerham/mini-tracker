{% extends "base.html" %}
{% block title %}Add Mini - Mini-Tracker{% endblock %}

{% block content %}
<h1>Add New Mini</h1>
<p><a href="/minis">&larr; Back to Collection</a></p>

<form method="post" action="/minis/new">
    <div class="form-row">
        <div>
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div>
            <label for="creature_type">Creature Type</label>
            <input type="text" id="creature_type" name="creature_type">
        </div>
    </div>
    <div class="form-row">
        <div>
            <label for="manufacturer">Manufacturer</label>
            <input type="text" id="manufacturer" name="manufacturer">
        </div>
        <div>
            <label for="product_line">Product Line</label>
            <input type="text" id="product_line" name="product_line">
        </div>
    </div>
    <div class="form-row">
        <div>
            <label for="set_name">Set Name</label>
            <input type="text" id="set_name" name="set_name">
        </div>
        <div>
            <label for="mini_number">Mini Number</label>
            <input type="text" id="mini_number" name="mini_number" placeholder="e.g. 77001 or 1/80">
        </div>
    </div>
    <div class="form-row">
        <div>
            <label for="size">Size</label>
            <select id="size" name="size">
                <option value="">--</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
                <option value="Huge">Huge</option>
                <option value="Gargantuan">Gargantuan</option>
            </select>
        </div>
        <div>
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="Unpainted">Unpainted</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
                <option value="Pre-painted">Pre-painted</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div>
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" value="1" min="1">
        </div>
        <div>
            <label for="completion_date">Completion Date</label>
            <input type="date" id="completion_date" name="completion_date">
        </div>
    </div>
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes"></textarea>

    <button type="submit" class="btn-success">Add Mini</button>
</form>
{% endblock %}
